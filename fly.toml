# fly.toml app configuration file generated for engram-beta on 2026-03-04T10:55:13-05:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'engram-beta'
primary_region = 'iad'

[build]

[env]
  ENGRAM_DATA_DIR = '/data/engram'
  PORT = '8080'

[[mounts]]
  source = 'engram_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
